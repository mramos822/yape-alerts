<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yape Alert · Moderación</title>
<script>
  // Aplica el tema guardado antes de pintar para evitar parpadeo.
  (function () {
    var t = localStorage.getItem('yape-theme');
    if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --purple: #6E2D8F;
    --purple-bright: #8B34A8;
    --purple-dark: #4E1E68;
    --purple-50: #F6EEFB;
    --purple-100: #EDDDF6;
    --purple-200: #DBBEEC;
    --teal: #14C6A4;
    --teal-bright: #20E7B9;
    --teal-soft: #E1FAF3;
    --ink: #2C1B36;
    --ink-soft: #6B5A75;
    --ink-mute: #9C8FA6;
    --bg: #F5F1FA;
    --card: #FFFFFF;
    --red: #E5484D;
    --red-soft: #FDECEC;
    --amber: #F0A020;
    --amber-soft: #FDF2DE;
    --green: #17B978;
    --green-soft: #E3F7EE;
    --toast-bg: #2C1B36;
    --shadow: 0 6px 20px rgba(78, 30, 104, .08);
    --shadow-hover: 0 10px 28px rgba(78, 30, 104, .16);
  }

  :root[data-theme="dark"] {
    --purple: #B884D8;
    --purple-bright: #CB97E8;
    --purple-dark: #3A1650;
    --purple-50: #271D33;
    --purple-100: #362941;
    --purple-200: #4B3A59;
    --teal: #20E7B9;
    --teal-bright: #2FF3C6;
    --teal-soft: rgba(32, 231, 185, .14);
    --ink: #F1EAF7;
    --ink-soft: #C3B4CF;
    --ink-mute: #948699;
    --bg: #161119;
    --card: #221A2B;
    --red: #FF6B70;
    --red-soft: rgba(229, 72, 77, .16);
    --amber: #F5B54A;
    --amber-soft: rgba(240, 160, 32, .15);
    --green: #2ED88E;
    --green-soft: rgba(23, 185, 120, .16);
    --toast-bg: #362941;
    --shadow: 0 6px 20px rgba(0, 0, 0, .38);
    --shadow-hover: 0 12px 30px rgba(0, 0, 0, .52);
  }
  :root[data-theme="dark"] .status-pending { color: #F5B54A; }
  :root[data-theme="dark"] .status-live { color: #2FF3C6; }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% -5%, rgba(110,45,143,.10), transparent 40%),
      radial-gradient(circle at 95% 0%, rgba(20,198,164,.10), transparent 38%);
    background-attachment: fixed;
    color: var(--ink);
    font-size: 15px;
    font-weight: 600;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  .app-header {
    position: relative;
    overflow: hidden;
    background: linear-gradient(118deg, #5E2380 0%, #7A2C9C 48%, #A23A93 100%);
    color: #fff;
    padding: 20px 26px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 8px 26px rgba(78, 30, 104, .28);
  }
  .app-header::after {
    content: '';
    position: absolute;
    top: -60%;
    left: -20%;
    width: 45%;
    height: 220%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
    transform: rotate(18deg);
    animation: sheen 7s ease-in-out infinite;
  }
  @keyframes sheen {
    0%, 100% { left: -30%; }
    50% { left: 120%; }
  }

  .logo-badge {
    width: 54px;
    height: 54px;
    border-radius: 16px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px;
    box-shadow: 0 6px 16px rgba(0,0,0,.18);
    flex-shrink: 0;
    z-index: 1;
  }
  .logo-badge img { width: 100%; height: 100%; object-fit: contain; }

  .header-text { z-index: 1; margin-right: auto; }
  .app-header h1 {
    font-size: 21px;
    font-weight: 900;
    margin: 0;
    letter-spacing: -.02em;
  }
  .app-header .subtitle {
    margin: 2px 0 0;
    font-size: 13.5px;
    font-weight: 600;
    color: rgba(255,255,255,.82);
  }

  .theme-toggle {
    z-index: 1;
    width: 42px; height: 42px;
    flex-shrink: 0;
    border-radius: 13px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.14);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .theme-toggle:hover { transform: translateY(-2px) rotate(-10deg); background: rgba(255,255,255,.26); }
  .theme-toggle:active { transform: scale(.9); }
  .theme-toggle svg { width: 20px; height: 20px; }

  .live-badge {
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    padding: 8px 15px;
    font-size: 13px;
    font-weight: 700;
    backdrop-filter: blur(4px);
  }
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--teal-bright);
    box-shadow: 0 0 0 0 rgba(32,231,185,.6);
    animation: livePulse 1.8s infinite;
  }
  .live-badge.off .live-dot { background: #ff7a7a; animation: none; box-shadow: none; }
  @keyframes livePulse {
    0% { box-shadow: 0 0 0 0 rgba(32,231,185,.55); }
    70% { box-shadow: 0 0 0 8px rgba(32,231,185,0); }
    100% { box-shadow: 0 0 0 0 rgba(32,231,185,0); }
  }

  /* ---------- Layout ---------- */
  .wrap { max-width: 1040px; margin: 0 auto; padding: 22px 20px 60px; }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tab-btn {
    background: var(--card);
    color: var(--ink-mute);
    border: 2px solid transparent;
    border-radius: 999px;
    padding: 9px 18px;
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 9px;
    box-shadow: var(--shadow);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), color .18s, box-shadow .18s;
  }
  .tab-btn:hover { transform: translateY(-2px); color: var(--purple); }
  .tab-btn.active { color: #fff; }
  .tab-btn[data-tab="pending"].active { background: linear-gradient(120deg, var(--amber), #E48A12); }
  .tab-btn[data-tab="approved"].active { background: linear-gradient(120deg, var(--teal), #10A98B); }
  .tab-btn[data-tab="rejected"].active { background: linear-gradient(120deg, #EF5A5F, #D33A40); }
  .tab-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .tab-btn[data-tab="pending"] .dot { background: var(--amber); }
  .tab-btn[data-tab="approved"] .dot { background: var(--teal); }
  .tab-btn[data-tab="rejected"] .dot { background: var(--red); }
  .tab-btn.active .dot { background: rgba(255,255,255,.9); }
  .tab-btn .count {
    background: var(--purple-50);
    color: var(--purple);
    border-radius: 999px;
    padding: 1px 9px;
    font-size: 12.5px;
    font-weight: 900;
    min-width: 22px;
    text-align: center;
    transition: transform .2s;
  }
  .tab-btn.active .count { background: rgba(255,255,255,.28); color: #fff; }
  .count.bump { animation: bump .45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes bump { 0% { transform: scale(1);} 40% { transform: scale(1.45);} 100% { transform: scale(1);} }

  .toolbar { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .icon-btn {
    border: 2px solid var(--purple-100);
    background: var(--card);
    color: var(--purple);
    border-radius: 999px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: var(--shadow);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), background .18s, border-color .18s;
  }
  .icon-btn:hover { transform: translateY(-2px); background: var(--purple-50); border-color: var(--purple-200); }
  .icon-btn.accent { background: linear-gradient(120deg, var(--teal), #10A98B); color: #fff; border-color: transparent; }
  .icon-btn.accent:hover { background: linear-gradient(120deg, #17D1AE, #12B394); }
  .icon-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ---------- Tab hint ---------- */
  .tab-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 18px 2px 14px;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--purple);
    background: var(--purple-50);
    border: 1px dashed var(--purple-200);
    border-radius: 12px;
    padding: 10px 14px;
    animation: hintIn .35s ease both;
  }
  @keyframes hintIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .tab-hint svg { width: 17px; height: 17px; flex-shrink: 0; }

  /* ---------- Cards ---------- */
  .cards { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 15px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    grid-template-areas:
      "avatar main    amount actions"
      "avatar message amount actions";
    align-items: center;
    gap: 4px 18px;
    box-shadow: var(--shadow);
    border-left: 5px solid transparent;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .3s, opacity .3s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .card.is-pending { border-left-color: var(--amber); }
  .card.is-live { border-left-color: var(--teal); }
  .card.is-done { border-left-color: var(--purple-200); opacity: .72; }
  .card.is-rejected { border-left-color: var(--red); opacity: .72; }

  .card.entering { animation: cardIn .45s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-16px) scale(.97); }
    to { opacity: 1; transform: none; }
  }
  .card.flash { animation: cardIn .45s cubic-bezier(.34,1.56,.64,1) both, flash 1.4s ease-out; }
  @keyframes flash {
    0% { box-shadow: 0 0 0 3px var(--teal-bright), var(--shadow); }
    100% { box-shadow: 0 0 0 0 rgba(32,231,185,0), var(--shadow); }
  }
  .card.pulse-live { animation: pulseLive .7s ease-out; }
  @keyframes pulseLive {
    0% { box-shadow: 0 0 0 0 rgba(20,198,164,.5), var(--shadow); }
    100% { box-shadow: 0 0 0 14px rgba(20,198,164,0), var(--shadow); }
  }
  .card.removing { animation: cardOut .32s ease forwards; }
  @keyframes cardOut {
    to { opacity: 0; transform: translateX(40px) scale(.94); }
  }

  .card-avatar {
    grid-area: avatar;
    align-self: center;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--purple-bright));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 900;
    box-shadow: 0 4px 10px rgba(110,45,143,.28);
    position: relative;
  }
  .card.is-rejected .card-avatar,
  .card.is-done .card-avatar { background: linear-gradient(135deg, #B4A6BE, #9C8FA6); box-shadow: none; }

  .card-main { grid-area: main; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .card-name { font-weight: 900; font-size: 15.5px; color: var(--ink); }
  .card-time { color: var(--ink-mute); font-size: 12.5px; font-weight: 700; }

  .card-status {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .02em;
    padding: 3px 10px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .card-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-pending { background: var(--amber-soft); color: #C57E10; }
  .status-live { background: var(--teal-soft); color: #0E9A80; }
  .status-live::before { animation: livePulse 1.8s infinite; }
  .status-rejected { background: var(--red-soft); color: var(--red); }
  .status-done { background: var(--purple-50); color: var(--purple); }

  .card-message {
    grid-area: message;
    position: relative;
    color: var(--ink);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    background: var(--purple-50);
    border-radius: 4px 14px 14px 14px;
    padding: 9px 14px;
    margin-top: 6px;
    max-width: 560px;
  }
  .card-message::before {
    content: '';
    position: absolute;
    top: -6px; left: 0;
    border-width: 0 10px 8px 0;
    border-style: solid;
    border-color: transparent var(--purple-50) transparent transparent;
  }
  .card-message em { color: var(--ink-mute); font-weight: 700; font-style: normal; opacity: .8; }

  .card-amount {
    grid-area: amount;
    align-self: center;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    line-height: 1;
    padding-right: 4px;
  }
  .card-amount .cur { font-size: 12px; font-weight: 800; color: var(--ink-mute); }
  .card-amount .val { font-size: 24px; font-weight: 900; color: var(--purple); letter-spacing: -.02em; }
  .card-amount .top {
    margin-top: 5px;
    font-size: 10.5px;
    font-weight: 900;
    color: #B7791F;
    background: linear-gradient(120deg, #FFE9A8, #FFD65C);
    border-radius: 999px;
    padding: 2px 8px;
    animation: shine 2.4s linear infinite;
    background-size: 200% auto;
  }
  @keyframes shine { to { background-position: 200% center; } }

  .card-actions {
    grid-area: actions;
    align-self: center;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-actions button {
    font-family: inherit;
    border: 2px solid transparent;
    border-radius: 999px;
    padding: 9px 15px;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: transform .16s cubic-bezier(.34,1.56,.64,1), filter .16s, background .16s, color .16s;
  }
  .card-actions button:hover { transform: translateY(-2px); }
  .card-actions button:active { transform: scale(.94); }
  .card-actions svg { width: 15px; height: 15px; }

  .btn-approve { background: linear-gradient(120deg, var(--green), #12A268); color: #fff; box-shadow: 0 4px 12px rgba(23,185,120,.32); }
  .btn-approve:hover { filter: brightness(1.06); }
  .btn-retry { background: linear-gradient(120deg, var(--purple), var(--purple-bright)); color: #fff; box-shadow: 0 4px 12px rgba(110,45,143,.28); }
  .btn-retry:hover { filter: brightness(1.08); }
  .btn-reject { background: var(--card); border-color: var(--red-soft); color: var(--red); }
  .btn-reject:hover { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-dismiss { background: var(--card); border-color: var(--purple-100); color: var(--purple); }
  .btn-dismiss:hover { background: var(--purple); border-color: var(--purple); color: #fff; }
  .btn-trash {
    background: transparent;
    border-color: transparent;
    color: var(--ink-mute);
    padding: 9px 10px;
  }
  .btn-trash:hover { background: var(--red-soft); color: var(--red); }

  /* ---------- Empty ---------- */
  .empty {
    text-align: center;
    padding: 54px 24px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    color: var(--ink-mute);
    font-size: 14.5px;
    font-weight: 700;
  }
  .empty .big {
    display: inline-flex;
    width: 70px; height: 70px;
    align-items: center; justify-content: center;
    background: var(--purple-50);
    border-radius: 50%;
    margin-bottom: 14px;
    animation: float 3s ease-in-out infinite;
  }
  .empty .big svg { width: 34px; height: 34px; color: var(--purple-200); }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  .empty strong { display: block; color: var(--ink); font-size: 16px; font-weight: 900; margin-bottom: 4px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(24px);
    background: var(--toast-bg);
    color: #fff;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 800;
    opacity: 0;
    box-shadow: 0 10px 30px rgba(44,27,54,.35);
    transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    z-index: 50;
    display: flex; align-items: center; gap: 9px;
  }
  .toast::before { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--teal-bright); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) {
    .app-header { padding: 16px 18px; }
    .card {
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "avatar main"
        "avatar amount"
        "message message"
        "actions actions";
    }
    .card-amount { align-self: flex-start; align-items: flex-start; flex-direction: row; gap: 5px; align-items: baseline; }
    .card-amount .top { margin-top: 0; }
    .card-message { max-width: none; }
    .card-actions { justify-content: flex-end; flex-wrap: wrap; margin-top: 8px; }
    .live-badge span:not(.live-dot) { display: none; }
  }
</style>
</head>
<body>
  <header class="app-header">
    <div class="logo-badge"><img src="logo/logo.png" alt="Yape"></div>
    <div class="header-text">
      <h1>Moderación de Yapes</h1>
      <p class="subtitle">Aprueba los pagos para que salgan en vivo en tu stream</p>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Cambiar modo claro/oscuro" aria-label="Cambiar tema"></button>
    <div class="live-badge" id="conn"><span class="live-dot"></span><span id="conn-text">Conectando…</span></div>
  </header>

  <div class="wrap">
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending" onclick="setTab('pending')">
        <span class="dot"></span> Pendientes <span class="count" id="count-pending">0</span>
      </button>
      <button class="tab-btn" data-tab="approved" onclick="setTab('approved')">
        <span class="dot"></span> Aprobados <span class="count" id="count-approved">0</span>
      </button>
      <button class="tab-btn" data-tab="rejected" onclick="setTab('rejected')">
        <span class="dot"></span> Rechazados <span class="count" id="count-rejected">0</span>
      </button>
      <div class="toolbar">
        <button class="icon-btn accent" id="test-samples-btn" onclick="sendTestSamples()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v5.5L5.5 17a2 2 0 0 0 1.8 3h9.4a2 2 0 0 0 1.8-3L14 8.5V3"/></svg>
          Probar overlay
        </button>
        <button class="icon-btn" id="clear-btn" onclick="clearApprovedRejected()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
          Vaciar historial
        </button>
      </div>
    </div>

    <div class="tab-hint" id="tab-hint"></div>

    <div id="cards" class="cards"></div>
    <div id="empty" class="empty" style="display:none">
      <span class="big">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </span>
      <strong>Todo tranquilo por aquí</strong>
      No hay pagos en esta pestaña por ahora.
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
  const SUPABASE_URL = 'https://jyjnqdvdrztjlptvfmms.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5am5xZHZkcnp0amxwdHZmbW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NTg2NDIsImV4cCI6MjA5OTAzNDY0Mn0.OyhPpooJ0IIHJqD3ust5O34DM6gQpF3A4As5GNs0XUg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Adapta las columnas snake_case de la tabla a la forma que ya usa todo el
  // codigo de render de abajo (onOverlay, everDismissed, receivedAt en ms).
  function mapRow(row) {
    return {
      id: row.id,
      name: row.name,
      amount: row.amount,
      message: row.message,
      raw: row.raw,
      status: row.status,
      everDismissed: row.ever_dismissed,
      onOverlay: row.on_overlay,
      receivedAt: row.received_at ? new Date(row.received_at).getTime() : null,
    };
  }

  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('empty');
  const toastEl = document.getElementById('toast');
  const hintEl = document.getElementById('tab-hint');
  const cardEls = new Map();
  const paymentsById = new Map();
  let currentTab = 'pending';
  let toastTimer = null;
  const prevCounts = { pending: null, approved: null, rejected: null };

  const ICON = {
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    eyeOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 10 8 10 8a18 18 0 0 1-2.16 3.19M6.6 6.6A18 18 0 0 0 2 12s3 8 10 8a9 9 0 0 0 5.4-1.6M1 1l22 22"/></svg>',
    replay: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
  };

  const HINTS = {
    pending: 'Estos pagos están esperando tu decisión. Pulsa <b>Aprobar</b> para mostrarlo en el overlay o <b>Rechazar</b> para descartarlo.',
    approved: 'Pagos que ya mostraste en el overlay. Puedes volver a mostrarlos cuando quieras.',
    rejected: 'Pagos que rechazaste. Se quedan aquí siempre, pero igual puedes mostrarlos en el overlay sin que se muevan.',
  };
  const HINT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>';

  const THEME_ICON = {
    // En claro mostramos la luna (para cambiar a oscuro); en oscuro, el sol.
    dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  };

  function updateThemeIcon() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    document.getElementById('theme-toggle').innerHTML = THEME_ICON[cur];
  }

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('yape-theme', next);
    updateThemeIcon();
    toast(next === 'dark' ? 'Modo oscuro activado 🌙' : 'Modo claro activado ☀️');
  }
  window.toggleTheme = toggleTheme;

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  function amountVal(p) {
    return `${p.amount || '0.00'}`;
  }

  function timeText(p) {
    if (!p.receivedAt) return '';
    const d = new Date(p.receivedAt);
    return d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
  }

  function tabOf(p) {
    // Una vez que un pago pasa por "Aprobados" (fue quitado del overlay al
    // menos una vez), se queda ahi para siempre, sin importar si se vuelve
    // a aprobar/quitar despues.
    if (p.status === 'rejected') return 'rejected';
    if (p.everDismissed) return 'approved';
    return 'pending';
  }

  function statusInfo(p) {
    if (p.onOverlay) return { text: 'En overlay', cls: 'live' };
    if (p.status === 'rejected') return { text: 'Rechazado', cls: 'rejected' };
    if (p.status === 'pending') return { text: 'Pendiente', cls: 'pending' };
    if (p.everDismissed) return { text: 'Mostrado', cls: 'done' };
    return { text: 'Pendiente', cls: 'pending' };
  }

  function cardClass(p) {
    if (p.onOverlay) return 'is-live';
    if (p.status === 'rejected') return 'is-rejected';
    if (p.status === 'pending') return 'is-pending';
    if (p.everDismissed) return 'is-done';
    return 'is-pending';
  }

  function actionsFor(p) {
    const trash = `<button class="btn-trash" onclick="deleteOne('${p.id}')" title="Borrar definitivamente">${ICON.trash}</button>`;
    if (p.status === 'pending') {
      return `
        <button class="btn-approve" onclick="act('${p.id}', 'approve')">${ICON.check} Aprobar</button>
        <button class="btn-reject" onclick="act('${p.id}', 'reject')">${ICON.x} Rechazar</button>
        ${trash}
      `;
    }
    if (p.status === 'approved') {
      return `
        <button class="btn-dismiss" onclick="act('${p.id}', 'dismiss')">${ICON.eyeOff} Quitar del overlay</button>
        ${trash}
      `;
    }
    // rechazado o previamente mostrado (dismissed): el mismo boton alterna
    // entre "Mostrar de nuevo" y "Quitar del overlay" segun si esta activo.
    const toggleBtn = p.onOverlay
      ? `<button class="btn-dismiss" onclick="act('${p.id}', 'dismiss')">${ICON.eyeOff} Quitar del overlay</button>`
      : `<button class="btn-retry" onclick="act('${p.id}', 'approve')">${ICON.replay} Mostrar de nuevo</button>`;
    return `
      ${toggleBtn}
      ${trash}
    `;
  }

  function renderRow(p, opts = {}) {
    paymentsById.set(p.id, p);

    let card = cardEls.get(p.id);
    const isNew = !card;
    if (isNew) {
      card = document.createElement('div');
      cardEls.set(p.id, card);
      cardsEl.prepend(card);
    }
    const tab = tabOf(p);
    const newClass = cardClass(p);
    const wasLive = card._live === true;
    card.dataset.tab = tab;
    card.className = `card ${newClass}`;
    card._live = (newClass === 'is-live');

    // Animacion: entrada para tarjetas nuevas, pulso al pasar a "en overlay".
    if (isNew && opts.animate) card.classList.add(opts.flash ? 'flash' : 'entering');
    if (!isNew && card._live && !wasLive) {
      card.classList.remove('pulse-live');
      void card.offsetWidth;
      card.classList.add('pulse-live');
    }

    const st = statusInfo(p);
    const initial = (p.name || '?').trim().charAt(0).toUpperCase();
    const amount = parseFloat(p.amount) || 0;
    const topBadge = amount >= 50 ? '<span class="top">★ TOP YAPE</span>' : '';
    card.innerHTML = `
      <div class="card-avatar">${initial}</div>
      <div class="card-main">
        <span class="card-name">${escapeHtml(p.name || 'Anónimo')}</span>
        <span class="card-status status-${st.cls}">${st.text}</span>
        <span class="card-time">${timeText(p)}</span>
      </div>
      <div class="card-message">${p.message ? escapeHtml(p.message) : '<em>Sin mensaje</em>'}</div>
      <div class="card-amount">
        <span class="cur">S/</span><span class="val">${amountVal(p)}</span>${topBadge}
      </div>
      <div class="card-actions">${actionsFor(p)}</div>
    `;
    applyFilter();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function updateCounts() {
    const counts = { pending: 0, approved: 0, rejected: 0 };
    paymentsById.forEach((p) => { counts[tabOf(p)]++; });
    for (const key of ['pending', 'approved', 'rejected']) {
      const el = document.getElementById('count-' + key);
      el.textContent = counts[key];
      if (prevCounts[key] !== null && prevCounts[key] !== counts[key]) {
        el.classList.remove('bump');
        void el.offsetWidth;
        el.classList.add('bump');
      }
      prevCounts[key] = counts[key];
    }
  }

  function applyFilter() {
    let visibleCount = 0;
    cardsEl.querySelectorAll('.card').forEach((card) => {
      const match = card.dataset.tab === currentTab;
      card.style.display = match ? '' : 'none';
      if (match) visibleCount++;
    });
    emptyEl.style.display = visibleCount === 0 ? 'block' : 'none';
    updateCounts();
  }

  function setTab(tab) {
    currentTab = tab;
    if (location.hash !== '#' + tab) history.replaceState(null, '', '#' + tab);
    document.querySelectorAll('.tab-btn').forEach((b) => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    hintEl.innerHTML = `${HINT_ICON}<span>${HINTS[tab]}</span>`;
    hintEl.style.animation = 'none';
    void hintEl.offsetWidth;
    hintEl.style.animation = '';
    applyFilter();
  }
  window.setTab = setTab;

  async function act(id, action) {
    if (action === 'approve') {
      const { error } = await sb.rpc('approve_payment', { target_id: id });
      if (error) { toast('No se pudo aprobar'); console.error(error); return; }
      toast('¡Aprobado! Ya sale en el overlay 🎉');
    } else if (action === 'reject') {
      const { error } = await sb.from('payments').update({ status: 'rejected' }).eq('id', id);
      if (error) { toast('No se pudo rechazar'); console.error(error); return; }
      toast('Pago rechazado');
    } else if (action === 'dismiss') {
      const p = paymentsById.get(id);
      const patch = { on_overlay: false };
      if (p && p.status !== 'rejected') { patch.status = 'dismissed'; patch.ever_dismissed = true; }
      const { error } = await sb.from('payments').update(patch).eq('id', id);
      if (error) { toast('No se pudo quitar del overlay'); console.error(error); return; }
      toast('Quitado del overlay');
    }
  }
  window.act = act;

  function removeRow(id) {
    const card = cardEls.get(id);
    if (card) {
      card.classList.add('removing');
      setTimeout(() => card.remove(), 320);
    }
    cardEls.delete(id);
    paymentsById.delete(id);
    setTimeout(applyFilter, 320);
  }

  async function deleteOne(id) {
    if (!confirm('¿Borrar este pago definitivamente? No se puede deshacer.')) return;
    const { error } = await sb.from('payments').delete().eq('id', id);
    if (error) { toast('No se pudo borrar'); console.error(error); }
  }
  window.deleteOne = deleteOne;

  async function clearApprovedRejected() {
    const ids = Array.from(paymentsById.values())
      .filter((p) => tabOf(p) === 'approved' || tabOf(p) === 'rejected')
      .map((p) => p.id);
    if (ids.length === 0) { toast('No hay nada que borrar ahí'); return; }
    if (!confirm(`¿Borrar ${ids.length} pago(s) aprobado(s)/rechazado(s)? No se puede deshacer.`)) return;
    const { error } = await sb.from('payments').delete().in('id', ids);
    if (error) { toast('No se pudo limpiar el historial'); console.error(error); return; }
    toast('Historial limpiado');
  }
  window.clearApprovedRejected = clearApprovedRejected;

  function setConn(ok) {
    const el = document.getElementById('conn');
    el.classList.toggle('off', !ok);
    document.getElementById('conn-text').textContent = ok ? 'En vivo' : 'Sin conexión';
  }

  async function loadInitial() {
    const { data, error } = await sb.from('payments').select('*').order('received_at', { ascending: false });
    if (error) { toast('No se pudieron cargar los pagos'); console.error(error); return; }
    data.slice().reverse().forEach((row) => renderRow(mapRow(row)));
    applyFilter();
  }

  function handleRealtimeChange(payload) {
    if (payload.eventType === 'INSERT') {
      toast(`Nuevo yape de ${payload.new.name || 'alguien'} 💜`);
      renderRow(mapRow(payload.new), { animate: true, flash: true });
    } else if (payload.eventType === 'UPDATE') {
      renderRow(mapRow(payload.new));
    } else if (payload.eventType === 'DELETE') {
      removeRow(payload.old.id);
    }
  }

  // Se resuscribe automaticamente si se corta la conexion. Cada vez que
  // queda "SUBSCRIBED" (la primera vez y tras reconectar) se vuelve a pedir
  // todo, para no perder cambios que hayan pasado durante el corte.
  function connect() {
    sb.channel('payments-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'payments' }, handleRealtimeChange)
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          setConn(true);
          loadInitial();
        } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          setConn(false);
        }
      });
  }

  const testSamples = [
    { name: 'Rosa Quispe', amount: '5.00' }, // sin mensaje
    { name: 'Juan Perez', amount: '10.00', message: 'Vamos!' }, // corto
    { name: 'Maria Fernanda Torres', amount: '25.50', message: 'Que buen stream, saludos desde Arequipa, sigue asi crack, te ganaste una nueva sub!' }, // largo
    { name: 'Pepe', amount: '2.00', message: 'Un yapecito nomas' }, // tier celeste
    { name: 'Carla Mendez', amount: '15.00', message: 'Ahi va algo para el canal' }, // tier amarillo
    { name: 'Diego Ramirez', amount: '50.00', message: 'Toma esto crack' }, // tier naranja
    { name: 'Ana Sofia Villanueva Castro', amount: '150.00', message: 'Increible contenido, gracias por todo lo que enseñas dia a dia' }, // tier rojo
    { name: 'Alejandro Fernandez de la Torre', amount: '8.00' }, // nombre largo, sin mensaje
  ];

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  async function sendTestSamples() {
    const btn = document.getElementById('test-samples-btn');
    btn.disabled = true;
    toast('Enviando pruebas al overlay…');
    for (const sample of testSamples) {
      const { data, error } = await sb.from('payments').insert(sample).select().single();
      if (error) { console.error(error); continue; }
      await sb.rpc('approve_payment', { target_id: data.id });
      await sleep(4000);
    }
    btn.disabled = false;
    toast('Listo, pruebas enviadas');
  }
  window.sendTestSamples = sendTestSamples;

  const initialTab = ['pending', 'approved', 'rejected'].includes(location.hash.slice(1))
    ? location.hash.slice(1) : 'pending';
  updateThemeIcon();
  setTab(initialTab);
  connect();
</script>
</body>
</html>
