<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="logo/mark.svg">
<title>PlayChat · Overlay</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Windows no tiene fuente con emoji de bandera reales (Chrome ahi los
     muestra como "AR"/"PR" en un cuadradito en vez de la banderita): se
     reemplazan por imagenes de verdad con Twemoji en vez de depender de la
     fuente del sistema operativo. -->
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
<style>
  :root {
    --author-avatar-size: 70px;
    --author-avatar-border-size: 3px;
    --author-avatar-border-color: #20E7B9;
    --name-bg-color: #20E7B9;
    --name-color: #06251f;
    --message-bg-color: #20E7B9;
    --message-color: #06251f;
    --author-font-size: 20px;
    --author-font-weight: 700;

    --donation-color: #5a4211;
    --donation-gradient-stop0: #bf953f;
    --donation-gradient-stop1: #ede599;
    --donation-gradient-stop2: #b38728;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }

  #stack {
    position: fixed;
    left: 0;
    bottom: 0;
  }

  .superchat {
    position: fixed;
    left: 80px;
    bottom: 120px;
    width: 900px;
    transform-origin: bottom left;
    transform: scale(1.44) translate3d(0, 200px, 0);
    transition: transform 0.32s cubic-bezier(.34,1.56,.64,1);
  }

  .superchat.show {
    transform: scale(1.44) translate3d(0, 0, 0);
  }

  .superchat.exiting {
    transform: scale(1.44) translate3d(0, 160px, 0) !important;
    transition: transform 0.32s cubic-bezier(.34,1.56,.64,1) !important;
  }

  .hl-message {
    position: absolute;
    top: -47px;
    left: 40px;
    max-width: 830px;
    min-width: 80px;
    background: var(--message-panel-bg, var(--message-bg-color));
    padding: 12px 20px 12px 56px;
  }

  .hl-img {
    box-sizing: border-box;
    position: absolute;
    top: -10px;
    left: -40px;
    width: 80px;
    height: 80px;
    background: var(--author-avatar-border-color);
    border-radius: 50%;
    padding: var(--author-avatar-border-size);
    z-index: 3;
  }

  .hl-img img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    object-fit: contain;
    object-position: 40% center;
  }

  .hl-initial {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #06251f;
    color: var(--name-bg-color);
    font-weight: 900;
    font-size: 30px;
  }

  .hl-name {
    position: absolute;
    top: -30px;
    left: 20px;
    font-weight: var(--author-font-weight);
    background: var(--name-panel-bg, var(--name-bg-color));
    color: var(--name-color);
    padding: 8px 14px;
    z-index: 2;
    font-size: var(--author-font-size);
    white-space: nowrap;
  }

  .text {
    color: var(--message-color);
    font-weight: 700;
    font-size: 22px;
    line-height: 1.35;
    word-break: break-word;
  }

  .text em {
    font-weight: 400;
    opacity: 0.75;
  }

  /* Imagen real de Twemoji para banderas/emoji (Windows no las dibuja bien
     con la fuente del sistema, ver script de twemoji en el head). */
  img.emoji {
    height: 1em;
    width: 1em;
    margin: 0 .05em 0 .1em;
    vertical-align: -0.1em;
  }

  .kick-emote {
    height: 26px;
    width: auto;
    vertical-align: middle;
    margin: 0 2px;
  }

  .kick-badge-icon {
    display: inline-block;
    height: 18px;
    width: 18px;
    vertical-align: middle;
    margin-left: 5px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .donation {
    position: absolute;
    top: 57px;
    left: 0;
    z-index: 4;
    width: max-content;
    min-width: 76px;
    max-width: 220px;
    box-sizing: border-box;
    text-align: center;
    border-radius: 5px;
    overflow: hidden;
    background: linear-gradient(to right, var(--donation-gradient-stop0), var(--donation-gradient-stop1), var(--donation-gradient-stop2));
    color: #fdfdfd;
    transform: rotate(-5deg) translateX(-50%);
  }

  .donation::after {
    content: "";
    position: absolute;
    top: -50%;
    left: 0;
    height: 200%;
    width: 1px;
    background-color: #fff;
    box-shadow: 0 0 20px 20px #fff;
    opacity: 0.7;
    transform: rotate(9deg) translate3d(-60px, 0, 0);
    animation: superchat-shimmer 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes superchat-shimmer {
    0% { transform: rotate(9deg) translate3d(-60px, 0, 0); }
    100% { transform: rotate(9deg) translate3d(200px, 0, 0); }
  }

  .donation-title {
    box-sizing: border-box;
    width: 100%;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    background-color: rgba(0, 0, 0, 0.15);
    padding: 2px 4px 1px;
    color: #fff;
    white-space: nowrap;
  }

  .donation-subtitle {
    box-sizing: border-box;
    width: 100%;
    font-size: 13px;
    font-weight: 800;
    padding: 1px 5px 2px;
    color: var(--donation-color);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div id="stack"></div>

  <audio id="alert-sound" src="alert.mp3" preload="auto"></audio>

<script>
  const SUPABASE_URL = 'https://jyjnqdvdrztjlptvfmms.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5am5xZHZkcnp0amxwdHZmbW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NTg2NDIsImV4cCI6MjA5OTAzNDY0Mn0.OyhPpooJ0IIHJqD3ust5O34DM6gQpF3A4As5GNs0XUg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Cada streamer tiene su propia URL de overlay: overlay.html?key=<overlay_key>.
  // La clave sale del panel (boton "Mis enlaces") y es secreta.
  const OVERLAY_KEY = new URLSearchParams(location.search).get('key');

  const stack = document.getElementById('stack');
  const sound = document.getElementById('alert-sound');
  const cardsById = new Map();

  const yapeLogoSvg = `<img src="logo/logo.png" alt="logo">`;

  // Que se esta mostrando ahora mismo: una tarjeta que sale de la base (yape
  // o superchat de YouTube ya aprobado, via syncCurrent) o un mensaje de
  // chat de Kick/YouTube resaltado (llega directo por broadcast, sin pasar
  // por payments). Sirve para que un "no hay nada que mostrar" de payments
  // no le pise el highlight de chat, y viceversa.
  let currentSource = null; // 'db' | 'kick' | 'youtube' | null

  // Unica fuente de verdad para los pagos/superchats: le pregunta a la base
  // cual es el pago activo de esta cuenta ahora mismo. Se llama al conectar,
  // cada vez que la base avisa un cambio, y de fondo cada tanto por si algun
  // aviso se pierde.
  async function syncCurrent() {
    // Mientras haya un highlight de chat (Kick o YouTube) al aire, un pago
    // que sigue "on_overlay" (no fue descartado a mano en el panel) no debe
    // taparlo; se vuelve a chequear solo cuando el highlight se suelta (ver
    // handleKickBroadcast/handleYoutubeBroadcast) asi no queda esperando el
    // proximo poll de 30s.
    if (currentSource === 'kick' || currentSource === 'youtube') return;
    const { data, error } = await sb.rpc('overlay_current', { p_key: OVERLAY_KEY });
    if (error) { console.error(error); return; }
    if (data) {
      // Si ya esta mostrado ese mismo pago con el mismo contenido, no se
      // vuelve a animar; solo se redibuja cuando cambia algo.
      const shown = cardsById.get(data.id);
      const sig = JSON.stringify(data);
      if (shown && shown._sig === sig) return;
      showCard(data, sig);
      currentSource = 'db';
    } else {
      hideAll();
      currentSource = null;
    }
  }

  function handleKickBroadcast(payload) {
    if (!payload || payload.clear) {
      if (currentSource === 'kick') {
        hideAll();
        currentSource = null;
        syncCurrent();
      }
      return;
    }
    showCard({ id: 'kick-live', name: payload.name, content: payload.content, badges: payload.badges, avatar: payload.avatar, source: 'kick' }, JSON.stringify(payload));
    currentSource = 'kick';
  }

  function handleYoutubeBroadcast(payload) {
    if (!payload || payload.clear) {
      if (currentSource === 'youtube') {
        hideAll();
        currentSource = null;
        syncCurrent();
      }
      return;
    }
    showCard({ id: 'youtube-live', name: payload.name, content: payload.content, badges: payload.badges, badgeImages: payload.badgeImages, avatar: payload.avatar, source: 'youtube', isMembership: payload.isMembership, memberLevel: payload.memberLevel }, JSON.stringify(payload));
    currentSource = 'youtube';
  }

  // Mismo mapeo de insignias que admin.html (public/kick-badges/*.png,
  // recortadas a mano de kick.com: no hay CDN publico con estos iconos).
  const KICK_BADGES = {
    broadcaster: { icon: 'broadcaster.png', text: 'Streamer' },
    moderator:   { icon: 'moderator.png', text: 'MOD' },
    vip:         { icon: 'vip.png', text: 'VIP' },
    og:          { icon: 'og.png', text: 'OG' },
    founder:     { icon: 'founder.png', text: 'Founder' },
    subscriber:  { icon: 'subscriber.png', text: 'SUB' },
    sub_gifter:  { icon: 'sub_gifter.png', text: 'Gifter' },
    verified:    { icon: 'verified.png', text: '✓' },
    ambassador:  { icon: 'ambassador.png', text: 'Ambassador' },
  };

  // Kick a veces manda el tipo con mayusculas/guiones distintos, y el de
  // suscriptor a veces viene como "sub"/"subscription" en vez de
  // "subscriber": se normaliza antes de buscar en KICK_BADGES (mismo
  // criterio que admin.html) para no perder el icono por un detalle asi.
  function lookupKickBadge(rawType) {
    const key = String(rawType || '').toLowerCase().trim().replace(/[\s-]+/g, '_');
    if (KICK_BADGES[key]) return KICK_BADGES[key];
    if (/^sub(scri(ber|ption))?$/.test(key)) return KICK_BADGES.subscriber;
    return null;
  }

  function renderKickBadges(badges) {
    if (!Array.isArray(badges) || !badges.length) return '';
    return badges.map((b) => {
      const rawType = b.type || b.badge_type || b.name || '';
      const info = lookupKickBadge(rawType);
      const title = escapeHtml(b.text || rawType || '');
      if (info) return `<span class="kick-badge-icon" style="background-image:url('kick-badges/${info.icon}')" title="${title}"></span>`;
      const fallbackText = (b.text || rawType || '?').slice(0, 4).toUpperCase();
      return `<span class="kick-badge-icon" style="background:#6E2D8F;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;" title="${title}">${escapeHtml(fallbackText)}</span>`;
    }).join('');
  }

  // Insignias de YouTube: llegan como strings simples ('owner'/'moderator'/
  // 'member'/'verified', ver ytBadgesFor en admin.html). Owner no tiene un
  // icono propio (se pinta como chip de color); moderador y verificado son
  // siempre el mismo icono en cualquier canal, asi que se guardaron una vez
  // como archivo (public/kick-badges/) en vez de depender del broadcast
  // (esos iconos vienen pesados como data:image y rompian el mensaje).
  const YT_BADGE_LABEL = { owner: 'STREAMER', moderator: 'MOD', member: 'MIEMBRO', verified: '✓' };
  const YT_BADGE_COLOR = { owner: '#E5484D', moderator: '#14C6A4', member: '#8B34A8', verified: '#20E7B9' };
  const YT_STATIC_BADGE_ICON = { moderator: 'yt-moderator.png', verified: 'yt-verified.png' };

  // El panel solo manda aca el icono real de un badge cuando es una URL de
  // imagen liviana (ej. el badge de miembro elegido por el canal): los
  // iconos pesados (mask-image de mod/verificado) se filtran del lado del
  // panel para no romper el broadcast, asi que esto nunca recibe esos.
  function renderYtBadgeImages(badgeImages) {
    if (!Array.isArray(badgeImages) || !badgeImages.length) return '';
    return badgeImages.map((b) => `<img class="kick-badge-icon" src="${escapeHtml(b.src)}" alt="${escapeHtml(b.alt || '')}" title="${escapeHtml(b.alt || '')}">`).join('');
  }

  function renderYtBadges(badges) {
    if (!Array.isArray(badges) || !badges.length) return '';
    return badges.map((b) => {
      const label = YT_BADGE_LABEL[b] || String(b || '').slice(0, 4).toUpperCase();
      if (YT_STATIC_BADGE_ICON[b]) {
        return `<img class="kick-badge-icon" src="kick-badges/${YT_STATIC_BADGE_ICON[b]}" alt="${escapeHtml(label)}" title="${escapeHtml(label)}">`;
      }
      const color = YT_BADGE_COLOR[b] || '#6E2D8F';
      return `<span class="kick-badge-icon" style="width:auto;padding:0 4px;background:${color};color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;" title="${escapeHtml(label)}">${escapeHtml(label)}</span>`;
    }).join('');
  }

  // Combina el icono real (si vino) con los chips de texto: cuando hay
  // imagen real de miembro, no se duplica con el chip de texto de miembro.
  function renderYtBadgesCombined(badges, badgeImages) {
    const hasMemberImage = Array.isArray(badgeImages) && badgeImages.length > 0;
    const imagesHtml = renderYtBadgeImages(badgeImages);
    const textBadges = (badges || []).filter((b) => !(b === 'member' && hasMemberImage));
    return imagesHtml + renderYtBadges(textBadges);
  }

  // El contenido trae los emotes inline como "[emote:ID:Nombre]"; se
  // reemplazan por la imagen real del CDN publico de Kick.
  function renderKickContent(content) {
    return String(content || '').split(/(\[emote:\d+:[^\]]*\])/g).map((part) => {
      const m = part.match(/^\[emote:(\d+):([^\]]*)\]$/);
      if (!m) return escapeHtml(part);
      const [, id, name] = m;
      return `<img class="kick-emote" src="https://files.kick.com/emotes/${id}/fullsize" alt="${escapeHtml(name)}" title="${escapeHtml(name)}">`;
    }).join('');
  }

  // Los emojis que scrapea la extension de YouTube (ver
  // browser-extension/scraper.js) vienen como "[yt-emoji:src:alt]" porque
  // innerText los pierde; se reemplazan por la imagen real.
  function renderYtContent(content) {
    return String(content || '').split(/(\[yt-emoji:[^:\]]*:[^\]]*\])/g).map((part) => {
      const m = part.match(/^\[yt-emoji:([^:\]]*):([^\]]*)\]$/);
      if (!m) return escapeHtml(part);
      const src = decodeURIComponent(m[1]);
      const alt = decodeURIComponent(m[2]);
      if (!src) return escapeHtml(alt);
      return `<img class="kick-emote" src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" title="${escapeHtml(alt)}">`;
    }).join('');
  }

  async function connect() {
    if (!OVERLAY_KEY) {
      console.error('Falta la clave del overlay: usa el enlace que aparece en "Mis enlaces" del panel.');
      return;
    }
    // Canal privado de broadcast: la base avisa por 'overlay-<key>' cada vez
    // que cambian los pagos de esta cuenta (ver notify_overlay en SQL), y el
    // panel manda ahi mismo el highlight de chat de Kick (ver toggleKickHighlight en admin.html).
    await sb.realtime.setAuth();
    sb.channel('overlay-' + OVERLAY_KEY, { config: { private: true } })
      .on('broadcast', { event: 'sync' }, () => { syncCurrent(); })
      .on('broadcast', { event: 'kick-msg' }, ({ payload }) => handleKickBroadcast(payload))
      .on('broadcast', { event: 'yt-msg' }, ({ payload }) => handleYoutubeBroadcast(payload))
      .on('broadcast', { event: 'kick-avatar-preload' }, ({ payload }) => {
        // Solo calienta la cache de imagenes del navegador (OBS no comparte
        // cache con la pestana del panel): no se muestra nada con esto.
        if (payload && payload.avatar) new Image().src = payload.avatar;
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') syncCurrent();
      });
    // Red de seguridad por si un aviso de realtime se pierde.
    setInterval(syncCurrent, 30000);
  }

  function tierColor(amount) {
    const n = parseFloat(amount) || 0;
    if (n >= 99.99) return '#DD2919';
    if (n >= 49.99) return '#E02766';
    if (n >= 19.99) return '#F17E05';
    if (n >= 9.99) return '#FCCB2B';
    if (n >= 4.99) return '#1DE9B6';
    return '#00E5F9';
  }

  // Un yape ya no varia de color por tramo de monto: siempre este morado
  // oscuro fijo (a diferencia de los superchats de YouTube, que si siguen
  // el tramo de color por monto via ytTierColor).
  const YAPE_COLOR = '#4A1D63';

  // Supabase guarda el monto como numeric, que al volver como JSON pierde
  // los ceros ("5.00" insertado vuelve como 5): se repone aca para que el
  // panelito del overlay siempre muestre 2 decimales.
  function yapeAmountText(amount) {
    const n = parseFloat(amount);
    return Number.isFinite(n) ? n.toFixed(2) : (amount || '0.00');
  }

  // Los 7 colores oficiales de tramo de Super Chat (azul, celeste, verde,
  // amarillo, naranja, magenta, rojo). El monto minimo de cada tramo NO es
  // el mismo numero en todas las monedas: YouTube lo redondea a un numero
  // "lindo" en la moneda local (confirmado con la tabla real en yenes:
  // ¥100/200/500/1000/2000/5000/10000 = los tramos de USD 1/2/5/10/20/50/100
  // convertidos y redondeados a la secuencia 1-2-5). YouTube no publica una
  // tabla oficial con el monto exacto de cada moneda, asi que se aproxima
  // igual: tasa de cambio a USD + redondeo a la secuencia 1-2-5. Los soles
  // (moneda de los yapes, no-YouTube, ver tierColor arriba) usan la escala
  // ya probada a mano en vez de esta aproximacion.
  const YT_TIER_COLORS = ['#2979FF', '#00E5F9', '#1DE9B6', '#FCCB2B', '#F17E05', '#E02766', '#DD2919'];
  const YT_USD_TIERS = [1, 2, 5, 10, 20, 50, 100];

  // Tramos REALES confirmados a mano (no calculados por tasa de cambio),
  // para las monedas donde se confirmo que YouTube usa un numero fijo que
  // NO seguia el dolar de mercado (ARS confirmado: 100=amarillo, 1000=rojo,
  // que da la secuencia 10/20/50/100/200/500/1000 -- ni cerca de lo que da
  // el dolar libre real). Si en el futuro se confirma la tabla real de otra
  // moneda volatil (TRY, NGN, etc.), agregarla aca en vez de confiar en el
  // calculo por tasa de cambio de YT_CURRENCIES.
  const YT_KNOWN_TIERS = {
    ARS: [10, 20, 50, 100, 200, 500, 1000],
  };

  // Todas las monedas en las que YouTube deja mandar un Super Chat/Super
  // Sticker (America, Europa, Asia, Oceania, Medio Oriente y Africa que
  // YouTube habilita). `rate` son unidades de esa moneda por 1 USD:
  // aproximado, solo sirve para clasificar el tramo de color (no para
  // mostrar montos exactos), y hay que actualizarlo de tanto en tanto,
  // sobre todo en monedas con inflacion alta (ARS, TRY, NGN). `prefixes`
  // es como YouTube escribe el monto (amountDisplayString/lo que lee el
  // scraper de #purchase-amount), de mas especifico a menos especifico.
  const YT_CURRENCIES = [
    { code: 'USD', rate: 1, prefixes: ['US$', 'USD'] },
    { code: 'EUR', rate: 0.92, prefixes: ['€', 'EUR'] },
    { code: 'GBP', rate: 0.79, prefixes: ['£', 'GBP'] },
    { code: 'JPY', rate: 155, prefixes: ['JP¥', '¥', 'JPY'] },
    { code: 'KRW', rate: 1380, prefixes: ['₩', 'KRW'] },
    { code: 'TWD', rate: 32, prefixes: ['NT$', 'TWD'] },
    { code: 'HKD', rate: 7.8, prefixes: ['HK$', 'HKD'] },
    { code: 'SGD', rate: 1.35, prefixes: ['S$', 'SGD'] },
    { code: 'INR', rate: 86, prefixes: ['₹', 'INR', 'Rs'] },
    { code: 'IDR', rate: 16300, prefixes: ['Rp', 'IDR'] },
    { code: 'VND', rate: 25400, prefixes: ['₫', 'VND'] },
    { code: 'THB', rate: 34, prefixes: ['฿', 'THB'] },
    { code: 'PHP', rate: 58, prefixes: ['₱', 'PHP'] },
    { code: 'MYR', rate: 4.5, prefixes: ['RM', 'MYR'] },
    { code: 'AUD', rate: 1.55, prefixes: ['A$', 'AUD'] },
    { code: 'NZD', rate: 1.7, prefixes: ['NZ$', 'NZD'] },
    { code: 'CAD', rate: 1.42, prefixes: ['CA$', 'CAD', 'C$'] },
    { code: 'CHF', rate: 0.88, prefixes: ['CHF', 'Fr.'] },
    { code: 'MXN', rate: 18.5, prefixes: ['MX$', 'MXN'] },
    { code: 'BRL', rate: 5.6, prefixes: ['R$', 'BRL'] },
    { code: 'ARS', rate: 1250, prefixes: ['ARS$', 'AR$', 'ARS'] },
    { code: 'CLP', rate: 950, prefixes: ['CLP$', 'CLP'] },
    { code: 'COP', rate: 4100, prefixes: ['COP$', 'CO$', 'COP'] },
    { code: 'PEN', rate: 3.75, prefixes: ['S/.', 'S/', 'PEN'] },
    { code: 'ZAR', rate: 18.5, prefixes: ['ZAR', 'R'] },
    { code: 'TRY', rate: 34, prefixes: ['₺', 'TRY'] },
    { code: 'NOK', rate: 10.9, prefixes: ['NOK', 'kr'] },
    { code: 'SEK', rate: 10.6, prefixes: ['SEK'] },
    { code: 'DKK', rate: 6.9, prefixes: ['DKK'] },
    { code: 'PLN', rate: 4.0, prefixes: ['zł', 'PLN'] },
    { code: 'CZK', rate: 23.5, prefixes: ['Kč', 'CZK'] },
    { code: 'HUF', rate: 380, prefixes: ['Ft', 'HUF'] },
    { code: 'RON', rate: 4.6, prefixes: ['lei', 'RON'] },
    { code: 'ILS', rate: 3.7, prefixes: ['₪', 'ILS'] },
    { code: 'SAR', rate: 3.75, prefixes: ['SAR', 'SR', 'ر.س'] },
    { code: 'NGN', rate: 1600, prefixes: ['₦', 'NGN'] },
    { code: 'BAM', rate: 1.8, prefixes: ['BAM', 'KM'] },
    { code: 'BYN', rate: 3.3, prefixes: ['BYN', 'Br'] },
  ];
  // Lista plana de (prefijo -> moneda) ordenada del prefijo mas largo al
  // mas corto: hay que probar "US$"/"CLP$"/"NT$" antes que el "$" o "R"
  // sueltos de otra moneda, si no cualquier simbolo generico gana primero.
  const YT_CURRENCY_PREFIXES = YT_CURRENCIES
    .flatMap((c) => c.prefixes.map((p) => ({ prefix: p, code: c.code })))
    .concat([{ prefix: '$', code: 'USD' }])
    .sort((a, b) => b.prefix.length - a.prefix.length);
  const YT_RATE_BY_CODE = Object.fromEntries(YT_CURRENCIES.map((c) => [c.code, c.rate]));

  function matchYoutubeCurrency(text) {
    const s = String(text || '');
    return YT_CURRENCY_PREFIXES.find((p) => s.includes(p.prefix)) || { prefix: '', code: 'USD' };
  }

  function detectYoutubeCurrency(text) {
    return matchYoutubeCurrency(text).code;
  }

  // Convierte el texto de monto tal cual lo muestra YouTube ("¥1,000",
  // "S/. 20.00", "1.234,56 €", "Rp10.000") a numero, sin asumir que la
  // coma es siempre miles ni que el punto es siempre decimal (cada region
  // usa una convencion distinta). El simbolo de moneda se saca ANTES de
  // limpiar el texto: algunos (ej. "S/.", "Fr.") traen un punto propio que
  // si no se quita se confunde con el separador decimal/miles del monto.
  function parseYoutubeAmount(text) {
    const raw = String(text || '');
    const { prefix } = matchYoutubeCurrency(raw);
    const withoutPrefix = prefix ? raw.split(prefix).join('') : raw;
    const cleaned = withoutPrefix.replace(/[^\d.,]/g, '');
    if (!cleaned) return 0;
    const lastComma = cleaned.lastIndexOf(',');
    const lastDot = cleaned.lastIndexOf('.');
    let decimalSep = null;
    if (lastComma > -1 && lastDot > -1) {
      decimalSep = lastComma > lastDot ? ',' : '.';
    } else if (lastComma > -1) {
      const parts = cleaned.split(',');
      decimalSep = (parts.length === 2 && parts[1].length <= 2) ? ',' : null;
    } else if (lastDot > -1) {
      const parts = cleaned.split('.');
      decimalSep = (parts.length === 2 && parts[1].length <= 2) ? '.' : null;
    }
    let normalized;
    if (decimalSep === ',') normalized = cleaned.split('.').join('').replace(',', '.');
    else if (decimalSep === '.') normalized = cleaned.split(',').join('');
    else normalized = cleaned.replace(/[.,]/g, '');
    return parseFloat(normalized) || 0;
  }

  // Redondea a la potencia de 10 mas cercana en la secuencia 1-2-5-10 (los
  // "numeros lindos" que usa YouTube para los tramos, ver comentario de
  // YT_TIER_COLORS).
  function niceRound125(x) {
    if (!(x > 0)) return x;
    const mag = Math.pow(10, Math.floor(Math.log10(x)));
    let best = mag;
    let bestDiff = Infinity;
    [1, 2, 5, 10].forEach((step) => {
      const candidate = step * mag;
      const diff = Math.abs(Math.log(x / candidate));
      if (diff < bestDiff) { bestDiff = diff; best = candidate; }
    });
    return best;
  }

  // Color de tramo de un Super Chat/Super Sticker de YouTube, en base al
  // texto de monto tal cual lo muestra YouTube (con su simbolo/codigo de
  // moneda). A diferencia de tierColor (que asume soles), esta reconoce la
  // moneda y clasifica el monto contra los tramos de ESA moneda.
  function ytTierColor(amountText) {
    const code = detectYoutubeCurrency(amountText);
    // Los soles y los dolares ya tienen una escala probada a mano
    // (tierColor de arriba, con el limite en X.99 no en X.00: un superchat
    // de USD 9.99 ya es amarillo, no verde, porque ese es el precio real
    // de venta que abre el tramo de arriba, confirmado a mano). No hace
    // falta aproximarla con numeros redondos.
    if (code === 'PEN' || code === 'USD') return tierColor(parseYoutubeAmount(amountText));
    const amount = parseYoutubeAmount(amountText);
    const knownTiers = YT_KNOWN_TIERS[code];
    let color = YT_TIER_COLORS[0];
    if (knownTiers) {
      for (let i = 0; i < knownTiers.length; i++) {
        if (amount >= knownTiers[i]) color = YT_TIER_COLORS[i];
      }
      return color;
    }
    const rate = YT_RATE_BY_CODE[code] || 1;
    for (let i = 0; i < YT_USD_TIERS.length; i++) {
      const localTier = niceRound125(YT_USD_TIERS[i] * rate);
      if (amount >= localTier) color = YT_TIER_COLORS[i];
    }
    return color;
  }

  // El nombre y el mensaje los escribe el que yapea: se escapan para que
  // nadie pueda meter HTML/scripts en el stream.
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function removeCard(el) {
    el.classList.add('exiting');
    setTimeout(() => el.remove(), 220);
  }

  function showCard(payment, sig) {
    // Solo se muestra una tarjeta a la vez: se quita cualquier tarjeta que
    // siga en el DOM al instante (incluso si estaba a mitad de su animacion
    // de salida por un dismiss automatico) para que no se solape con la
    // entrada de la nueva.
    stack.querySelectorAll('.superchat').forEach((el) => el.remove());
    cardsById.clear();

    // Yape enmascara el apellido truncado con un asterisco ("Mariano Ram*"):
    // se saca, que se lea "Ram" en vez de "Ram*".
    const name = (payment.name || 'Alguien').replace(/\*+\s*$/, '').trim() || 'Alguien';
    const isKick = payment.source === 'kick';
    const isYoutube = payment.source === 'youtube';
    // Un superchat aprobado (viene de payments, via syncCurrent) y un
    // mensaje de chat de YouTube resaltado (viene directo por broadcast)
    // comparten source='youtube', pero se pintan distinto: el highlight
    // trae `content` (aunque sea texto vacio) y el superchat no.
    const isChatHighlight = (isKick || isYoutube) && payment.content !== undefined;
    // Un yape ya no sigue el tramo de color por monto (eso queda solo para
    // superchats de YouTube): siempre el mismo morado oscuro, con letras
    // blancas en vez de negras para que se lea bien encima de ese fondo.
    const isYape = !isKick && !isYoutube;
    // El highlight de un mensaje de chat de YouTube tiene su color propio
    // (#03E7C0); un superchat ya aprobado sigue la misma regla de color por
    // monto (ytTierColor), no un color fijo.
    const nameColor = isKick ? '#FFA606'
      : (isYoutube && isChatHighlight) ? '#03E7C0'
      : isYoutube ? ytTierColor(payment.amount)
      : YAPE_COLOR;
    const messageColor = isChatHighlight ? '#222222' : nameColor;
    const el = document.createElement('div');
    el.className = 'superchat';
    el.style.setProperty('--name-bg-color', nameColor);
    el.style.setProperty('--message-bg-color', messageColor);
    el.style.setProperty('--message-color', (isChatHighlight || isYape) ? '#F2F2F2' : '#06251f');
    el.style.setProperty('--name-color', isYape ? '#F2F2F2' : '#06251f');
    el.style.setProperty('--author-avatar-border-color', nameColor);
    // Yape: degradado leve de derecha a izquierda en vez de un morado plano,
    // tanto en el cuadro del nombre como en el del mensaje.
    if (isYape) {
      const gradient = `linear-gradient(to right, ${nameColor}, color-mix(in srgb, ${nameColor} 82%, black))`;
      el.style.setProperty('--name-panel-bg', gradient);
      el.style.setProperty('--message-panel-bg', gradient);
    }
    // El avatar real llega directo en el highlight (payment.avatar); para un
    // superchat aprobado va guardado en `raw` (payments no tiene columna
    // dedicada para eso, ver insertYoutubeSuperchat en admin.html).
    let avatarUrl = payment.avatar || '';
    if (!avatarUrl && isYoutube && payment.raw) {
      try { avatarUrl = JSON.parse(payment.raw).avatar || ''; } catch { /* sin avatar */ }
    }
    const avatar = (isChatHighlight || isYoutube)
      ? (avatarUrl
          ? `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(name)}">`
          : isKick
            ? `<img src="images/pfpdefault.png" alt="${escapeHtml(name)}">`
            : `<div class="hl-initial">${escapeHtml(name.trim().charAt(0).toUpperCase() || '?')}</div>`)
      : yapeLogoSvg;
    // El "panelito" dorado de monto es normalmente solo para yapes y
    // superchats (un mensaje de chat resaltado comun no lo tiene), pero un
    // "nuevo miembro"/aniversario (toggleYoutubeHighlight en admin.html)
    // llega igual que un mensaje resaltado (mismo layout de siempre) con
    // isMembership=true -- ahi el panel se muestra igual, solo que en vez
    // del monto va el nivel de membresia comprado.
    const donation = payment.isMembership
      ? `<div class="donation"><div class="donation-title"></div><div class="donation-subtitle">${escapeHtml(payment.memberLevel || '')}</div></div>`
      : isChatHighlight
        ? ''
        : isYoutube
          ? `<div class="donation"><div class="donation-title">DONATION</div><div class="donation-subtitle">${escapeHtml(payment.amount || '')}</div></div>`
          : `<div class="donation"><div class="donation-title">YAPE</div><div class="donation-subtitle">S/. ${yapeAmountText(payment.amount)}</div></div>`;
    const nameLine = isChatHighlight
      ? `${escapeHtml(name)}${isKick ? renderKickBadges(payment.badges) : renderYtBadgesCombined(payment.badges, payment.badgeImages)}`
      : escapeHtml(name);
    const textLine = isChatHighlight
      ? ((payment.content)
          ? (isKick ? renderKickContent(payment.content) : renderYtContent(payment.content))
          : '<em>(sin mensaje)</em>')
      : (payment.message ? escapeHtml(payment.message) : '<em>(sin mensaje)</em>');
    el.innerHTML = `
      <div class="hl-message">
        <div class="hl-img">${avatar}</div>
        <div class="hl-name">${nameLine}</div>
        ${donation}
        <div class="text">${textLine}</div>
      </div>
    `;
    if (window.twemoji) twemoji.parse(el);
    el._sig = sig || JSON.stringify(payment);
    stack.appendChild(el);
    cardsById.set(payment.id, el);

    sound.currentTime = 0;
    sound.play().catch(() => {});

    // Forzar reflow para que el navegador registre el estado inicial
    // antes de animar (si no, a veces el transition de entrada se pierde).
    void el.offsetHeight;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add('show'));
    });
  }

  function hideCard(id) {
    const el = cardsById.get(id);
    if (!el) return;
    removeCard(el);
    cardsById.delete(id);
  }

  // Salida animada: la limpieza instantanea solo corresponde en showCard,
  // donde una tarjeta nueva reemplaza a la anterior sin solaparse.
  function hideAll() {
    stack.querySelectorAll('.superchat:not(.exiting)').forEach((el) => removeCard(el));
    cardsById.clear();
  }

  connect();
</script>
</body>
</html>
