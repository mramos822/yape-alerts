<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Yape Superchat Overlay</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --author-avatar-size: 70px;
    --author-avatar-border-size: 3px;
    --author-avatar-border-color: #20E7B9;
    --name-bg-color: #20E7B9;
    --name-color: #06251f;
    --message-bg-color: #20E7B9;
    --message-color: #06251f;
    --author-font-size: 15px;
    --author-font-weight: 700;

    --donation-color: #5a4211;
    --donation-gradient-stop0: #bf953f;
    --donation-gradient-stop1: #ede599;
    --donation-gradient-stop2: #b38728;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
  }

  #stack {
    position: fixed;
    left: 0;
    bottom: 0;
  }

  .superchat {
    position: fixed;
    left: 80px;
    bottom: 100px;
    width: 900px;
    transform-origin: bottom left;
    transform: scale(1.44) translate3d(0, 200px, 0);
    transition: transform 0.32s cubic-bezier(.34,1.56,.64,1);
  }

  .superchat.show {
    transform: scale(1.44) translate3d(0, 0, 0);
  }

  .superchat.exiting {
    transform: scale(1.44) translate3d(0, 160px, 0) !important;
    transition: transform 0.32s cubic-bezier(.34,1.56,.64,1) !important;
  }

  .hl-message {
    position: absolute;
    top: -47px;
    left: 40px;
    max-width: 760px;
    min-width: 80px;
    background: var(--message-bg-color);
    padding: 12px 20px 12px 56px;
  }

  .hl-img {
    box-sizing: border-box;
    position: absolute;
    top: -10px;
    left: -40px;
    width: 80px;
    height: 80px;
    background: var(--author-avatar-border-color);
    border-radius: 50%;
    padding: var(--author-avatar-border-size);
    z-index: 3;
  }

  .hl-img img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #fff;
    object-fit: contain;
    object-position: 40% center;
  }

  .hl-initial {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #06251f;
    color: var(--name-bg-color);
    font-weight: 900;
    font-size: 30px;
  }

  .hl-name {
    position: absolute;
    top: -30px;
    left: 20px;
    font-weight: var(--author-font-weight);
    background: var(--name-bg-color);
    color: var(--name-color);
    padding: 8px 14px;
    z-index: 2;
    font-size: var(--author-font-size);
    white-space: nowrap;
  }

  .text {
    color: var(--message-color);
    font-weight: 700;
    font-size: 17px;
    line-height: 1.35;
    word-break: break-word;
  }

  .text em {
    font-weight: 400;
    opacity: 0.75;
  }

  .kick-emote {
    height: 26px;
    width: auto;
    vertical-align: middle;
    margin: 0 2px;
  }

  .kick-badge-icon {
    display: inline-block;
    height: 18px;
    width: 18px;
    vertical-align: middle;
    margin-right: 5px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .donation {
    position: absolute;
    top: 50px;
    left: 0;
    z-index: 4;
    min-width: 76px;
    text-align: center;
    border-radius: 5px;
    overflow: hidden;
    background: linear-gradient(to right, var(--donation-gradient-stop0), var(--donation-gradient-stop1), var(--donation-gradient-stop2));
    color: #fdfdfd;
    transform: rotate(-5deg) translateX(-50%);
  }

  .donation::after {
    content: "";
    position: absolute;
    top: -50%;
    left: 0;
    height: 200%;
    width: 1px;
    background-color: #fff;
    box-shadow: 0 0 20px 20px #fff;
    opacity: 0.7;
    transform: rotate(9deg) translate3d(-60px, 0, 0);
    animation: superchat-shimmer 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes superchat-shimmer {
    0% { transform: rotate(9deg) translate3d(-60px, 0, 0); }
    100% { transform: rotate(9deg) translate3d(200px, 0, 0); }
  }

  .donation-title {
    width: 100%;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    background-color: rgba(0, 0, 0, 0.15);
    padding: 2px 4px 1px;
    color: #fff;
  }

  .donation-subtitle {
    font-size: 13px;
    font-weight: 800;
    padding: 1px 5px 2px;
    color: var(--donation-color);
  }
</style>
</head>
<body>
  <div id="stack"></div>

  <audio id="alert-sound" src="alert.mp3" preload="auto"></audio>

<script>
  const SUPABASE_URL = 'https://jyjnqdvdrztjlptvfmms.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5am5xZHZkcnp0amxwdHZmbW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NTg2NDIsImV4cCI6MjA5OTAzNDY0Mn0.OyhPpooJ0IIHJqD3ust5O34DM6gQpF3A4As5GNs0XUg';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Cada streamer tiene su propia URL de overlay: overlay.html?key=<overlay_key>.
  // La clave sale del panel (boton "Mis enlaces") y es secreta.
  const OVERLAY_KEY = new URLSearchParams(location.search).get('key');

  const stack = document.getElementById('stack');
  const sound = document.getElementById('alert-sound');
  const cardsById = new Map();

  const yapeLogoSvg = `<img src="logo/logo.png" alt="logo">`;

  // Que se esta mostrando ahora mismo: una tarjeta que sale de la base (yape
  // o superchat de YouTube ya aprobado, via syncCurrent) o un mensaje de
  // chat de Kick/YouTube resaltado (llega directo por broadcast, sin pasar
  // por payments). Sirve para que un "no hay nada que mostrar" de payments
  // no le pise el highlight de chat, y viceversa.
  let currentSource = null; // 'db' | 'kick' | 'youtube' | null

  // Unica fuente de verdad para los pagos/superchats: le pregunta a la base
  // cual es el pago activo de esta cuenta ahora mismo. Se llama al conectar,
  // cada vez que la base avisa un cambio, y de fondo cada tanto por si algun
  // aviso se pierde.
  async function syncCurrent() {
    // Mientras haya un highlight de chat (Kick o YouTube) al aire, un pago
    // que sigue "on_overlay" (no fue descartado a mano en el panel) no debe
    // taparlo; se vuelve a chequear solo cuando el highlight se suelta (ver
    // handleKickBroadcast/handleYoutubeBroadcast) asi no queda esperando el
    // proximo poll de 30s.
    if (currentSource === 'kick' || currentSource === 'youtube') return;
    const { data, error } = await sb.rpc('overlay_current', { p_key: OVERLAY_KEY });
    if (error) { console.error(error); return; }
    if (data) {
      // Si ya esta mostrado ese mismo pago con el mismo contenido, no se
      // vuelve a animar; solo se redibuja cuando cambia algo.
      const shown = cardsById.get(data.id);
      const sig = JSON.stringify(data);
      if (shown && shown._sig === sig) return;
      showCard(data, sig);
      currentSource = 'db';
    } else {
      hideAll();
      currentSource = null;
    }
  }

  function handleKickBroadcast(payload) {
    if (!payload || payload.clear) {
      if (currentSource === 'kick') {
        hideAll();
        currentSource = null;
        syncCurrent();
      }
      return;
    }
    showCard({ id: 'kick-live', name: payload.name, content: payload.content, badges: payload.badges, avatar: payload.avatar, source: 'kick' }, JSON.stringify(payload));
    currentSource = 'kick';
  }

  function handleYoutubeBroadcast(payload) {
    if (!payload || payload.clear) {
      if (currentSource === 'youtube') {
        hideAll();
        currentSource = null;
        syncCurrent();
      }
      return;
    }
    showCard({ id: 'youtube-live', name: payload.name, content: payload.content, badges: payload.badges, avatar: payload.avatar, source: 'youtube' }, JSON.stringify(payload));
    currentSource = 'youtube';
  }

  // Mismo mapeo de insignias que admin.html (public/kick-badges/*.png,
  // recortadas a mano de kick.com: no hay CDN publico con estos iconos).
  const KICK_BADGES = {
    broadcaster: { icon: 'broadcaster.png', text: 'Streamer' },
    moderator:   { icon: 'moderator.png', text: 'MOD' },
    vip:         { icon: 'vip.png', text: 'VIP' },
    og:          { icon: 'og.png', text: 'OG' },
    founder:     { icon: 'founder.png', text: 'Founder' },
    subscriber:  { icon: 'subscriber.png', text: 'SUB' },
    sub_gifter:  { icon: 'sub_gifter.png', text: 'Gifter' },
    verified:    { icon: 'verified.png', text: '✓' },
    ambassador:  { icon: 'ambassador.png', text: 'Ambassador' },
  };

  // Kick a veces manda el tipo con mayusculas/guiones distintos, y el de
  // suscriptor a veces viene como "sub"/"subscription" en vez de
  // "subscriber": se normaliza antes de buscar en KICK_BADGES (mismo
  // criterio que admin.html) para no perder el icono por un detalle asi.
  function lookupKickBadge(rawType) {
    const key = String(rawType || '').toLowerCase().trim().replace(/[\s-]+/g, '_');
    if (KICK_BADGES[key]) return KICK_BADGES[key];
    if (/^sub(scri(ber|ption))?$/.test(key)) return KICK_BADGES.subscriber;
    return null;
  }

  function renderKickBadges(badges) {
    if (!Array.isArray(badges) || !badges.length) return '';
    return badges.map((b) => {
      const rawType = b.type || b.badge_type || b.name || '';
      const info = lookupKickBadge(rawType);
      const title = escapeHtml(b.text || rawType || '');
      if (info) return `<span class="kick-badge-icon" style="background-image:url('kick-badges/${info.icon}')" title="${title}"></span>`;
      const fallbackText = (b.text || rawType || '?').slice(0, 4).toUpperCase();
      return `<span class="kick-badge-icon" style="background:#6E2D8F;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;" title="${title}">${escapeHtml(fallbackText)}</span>`;
    }).join('');
  }

  // Insignias de YouTube: llegan como strings simples ('owner'/'moderator'/
  // 'member'/'verified', ver ytBadgesFor en admin.html), no como objetos con
  // icono real (no hay sheet de YouTube): se pintan como chip de color.
  const YT_BADGE_LABEL = { owner: 'STREAMER', moderator: 'MOD', member: 'MIEMBRO', verified: '✓' };
  const YT_BADGE_COLOR = { owner: '#E5484D', moderator: '#14C6A4', member: '#8B34A8', verified: '#20E7B9' };

  function renderYtBadges(badges) {
    if (!Array.isArray(badges) || !badges.length) return '';
    return badges.map((b) => {
      const label = YT_BADGE_LABEL[b] || String(b || '').slice(0, 4).toUpperCase();
      const color = YT_BADGE_COLOR[b] || '#6E2D8F';
      return `<span class="kick-badge-icon" style="width:auto;padding:0 4px;background:${color};color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;" title="${escapeHtml(label)}">${escapeHtml(label)}</span>`;
    }).join('');
  }

  // El contenido trae los emotes inline como "[emote:ID:Nombre]"; se
  // reemplazan por la imagen real del CDN publico de Kick.
  function renderKickContent(content) {
    return String(content || '').split(/(\[emote:\d+:[^\]]*\])/g).map((part) => {
      const m = part.match(/^\[emote:(\d+):([^\]]*)\]$/);
      if (!m) return escapeHtml(part);
      const [, id, name] = m;
      return `<img class="kick-emote" src="https://files.kick.com/emotes/${id}/fullsize" alt="${escapeHtml(name)}" title="${escapeHtml(name)}">`;
    }).join('');
  }

  async function connect() {
    if (!OVERLAY_KEY) {
      console.error('Falta la clave del overlay: usa el enlace que aparece en "Mis enlaces" del panel.');
      return;
    }
    // Canal privado de broadcast: la base avisa por 'overlay-<key>' cada vez
    // que cambian los pagos de esta cuenta (ver notify_overlay en SQL), y el
    // panel manda ahi mismo el highlight de chat de Kick (ver toggleKickHighlight en admin.html).
    await sb.realtime.setAuth();
    sb.channel('overlay-' + OVERLAY_KEY, { config: { private: true } })
      .on('broadcast', { event: 'sync' }, () => { syncCurrent(); })
      .on('broadcast', { event: 'kick-msg' }, ({ payload }) => handleKickBroadcast(payload))
      .on('broadcast', { event: 'yt-msg' }, ({ payload }) => handleYoutubeBroadcast(payload))
      .on('broadcast', { event: 'kick-avatar-preload' }, ({ payload }) => {
        // Solo calienta la cache de imagenes del navegador (OBS no comparte
        // cache con la pestana del panel): no se muestra nada con esto.
        if (payload && payload.avatar) new Image().src = payload.avatar;
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') syncCurrent();
      });
    // Red de seguridad por si un aviso de realtime se pierde.
    setInterval(syncCurrent, 30000);
  }

  function tierColor(amount) {
    const n = parseFloat(amount) || 0;
    if (n >= 99.99) return '#DD2919';
    if (n >= 49.99) return '#E02766';
    if (n >= 19.99) return '#F17E05';
    if (n >= 9.99) return '#FCCB2B';
    if (n >= 4.99) return '#1DE9B6';
    return '#00E5F9';
  }

  // El nombre y el mensaje los escribe el que yapea: se escapan para que
  // nadie pueda meter HTML/scripts en el stream.
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function removeCard(el) {
    el.classList.add('exiting');
    setTimeout(() => el.remove(), 220);
  }

  function showCard(payment, sig) {
    // Solo se muestra una tarjeta a la vez: se quita cualquier tarjeta que
    // siga en el DOM al instante (incluso si estaba a mitad de su animacion
    // de salida por un dismiss automatico) para que no se solape con la
    // entrada de la nueva.
    stack.querySelectorAll('.superchat').forEach((el) => el.remove());
    cardsById.clear();

    const name = payment.name || 'Alguien';
    const isKick = payment.source === 'kick';
    const isYoutube = payment.source === 'youtube';
    // Un superchat aprobado (viene de payments, via syncCurrent) y un
    // mensaje de chat de YouTube resaltado (viene directo por broadcast)
    // comparten source='youtube', pero se pintan distinto: el highlight
    // trae `content` (aunque sea texto vacio) y el superchat no.
    const isChatHighlight = (isKick || isYoutube) && payment.content !== undefined;
    const nameColor = isKick ? '#FFA606' : isYoutube ? '#FF3B30' : tierColor(payment.amount);
    const messageColor = isChatHighlight ? '#222222' : nameColor;
    const el = document.createElement('div');
    el.className = 'superchat';
    el.style.setProperty('--name-bg-color', nameColor);
    el.style.setProperty('--message-bg-color', messageColor);
    el.style.setProperty('--message-color', isChatHighlight ? '#F2F2F2' : '#06251f');
    el.style.setProperty('--author-avatar-border-color', nameColor);
    // El avatar real llega directo en el highlight (payment.avatar); para un
    // superchat aprobado va guardado en `raw` (payments no tiene columna
    // dedicada para eso, ver insertYoutubeSuperchat en admin.html).
    let avatarUrl = payment.avatar || '';
    if (!avatarUrl && isYoutube && payment.raw) {
      try { avatarUrl = JSON.parse(payment.raw).avatar || ''; } catch { /* sin avatar */ }
    }
    const avatar = (isChatHighlight || isYoutube)
      ? (avatarUrl
          ? `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(name)}">`
          : `<div class="hl-initial">${escapeHtml(name.trim().charAt(0).toUpperCase() || '?')}</div>`)
      : yapeLogoSvg;
    // El "panelito" de monto es solo para yapes y superchats: un mensaje de
    // chat resaltado (Kick o YouTube) no tiene donation ribbon.
    const donation = isChatHighlight
      ? ''
      : isYoutube
        ? `<div class="donation"><div class="donation-title">SUPERCHAT</div><div class="donation-subtitle">${escapeHtml(payment.amount || '')}</div></div>`
        : `<div class="donation"><div class="donation-title">YAPE</div><div class="donation-subtitle">S/. ${payment.amount || '0.00'}</div></div>`;
    const nameLine = isChatHighlight
      ? `${isKick ? renderKickBadges(payment.badges) : renderYtBadges(payment.badges)}${escapeHtml(name)}`
      : escapeHtml(name);
    const textLine = isChatHighlight
      ? ((payment.content)
          ? (isKick ? renderKickContent(payment.content) : escapeHtml(payment.content))
          : '<em>(sin mensaje)</em>')
      : (payment.message ? escapeHtml(payment.message) : '<em>(sin mensaje)</em>');
    el.innerHTML = `
      <div class="hl-message">
        <div class="hl-img">${avatar}</div>
        <div class="hl-name">${nameLine}</div>
        ${donation}
        <div class="text">${textLine}</div>
      </div>
    `;
    el._sig = sig || JSON.stringify(payment);
    stack.appendChild(el);
    cardsById.set(payment.id, el);

    sound.currentTime = 0;
    sound.play().catch(() => {});

    // Forzar reflow para que el navegador registre el estado inicial
    // antes de animar (si no, a veces el transition de entrada se pierde).
    void el.offsetHeight;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add('show'));
    });
  }

  function hideCard(id) {
    const el = cardsById.get(id);
    if (!el) return;
    removeCard(el);
    cardsById.delete(id);
  }

  // Salida animada: la limpieza instantanea solo corresponde en showCard,
  // donde una tarjeta nueva reemplaza a la anterior sin solaparse.
  function hideAll() {
    stack.querySelectorAll('.superchat:not(.exiting)').forEach((el) => removeCard(el));
    cardsById.clear();
  }

  connect();
</script>
</body>
</html>
